server {
    listen 80;
    index index.php index.html;

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;

    root /var/www/public;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;

    # Max upload size (for file uploads in Homi)
    client_max_body_size 20M;

    # =====================================================
    # FIX 403: Layani storage files secara langsung
    # Ini WAJIB agar gambar announcements, QR, dll muncul
    # =====================================================
    location ^~ /storage/ {
        # Coba serve file langsung dari disk (bukan lewat PHP)
        # Path ini resolve ke /var/www/public/storage/ -> symlink ke /var/www/storage/app/public/
        try_files $uri $uri/ =404;

        # Cache agresif untuk static assets
        expires 7d;
        add_header Cache-Control "public, immutable";

        # Izinkan akses dari mana saja (untuk mobile app)
        add_header Access-Control-Allow-Origin "*";

        # Matikan autoindex (keamanan)
        autoindex off;
    }

    # Serve file PHP
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
    }
}



